<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fordyce Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,800;1,300&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FDF6EC;
    --card: #FFFDF9;
    --terra: #C4622D;
    --terra-light: #F5E6DB;
    --terra-dark: #8B3E17;
    --sage: #4A7C59;
    --sage-light: #E0EDE4;
    --ink: #2C1810;
    --ink-muted: #7A6558;
    --ink-faint: #C5B8B0;
    --blue: #3D6B99;
    --blue-light: #E0EBF5;
    --amber: #D4820A;
    --amber-light: #FEF3DC;
    --purple: #6B4E9B;
    --purple-light: #EDE6F7;
    --rose: #B84465;
    --rose-light: #F7E4EC;
    --green: #3D7A4E;
    --green-light: #E2F0E6;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--cream); font-family: 'Nunito', sans-serif; color: var(--ink); font-size: 15px; }

  body {
    display: grid;
    grid-template-rows: auto 1fr 220px;
    height: 100vh;
    padding: 14px;
    gap: 12px;
  }

  /* TOP BAR */
  .topbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: var(--card); border-radius: var(--radius); padding: 12px 24px; border: 1px solid rgba(196,98,45,0.15); }
  .family-name { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--terra); letter-spacing: -0.3px; }
  .family-name span { font-weight: 300; font-style: italic; color: var(--ink-muted); font-size: 18px; }
  .clock-block { text-align: center; }
  #clock { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 800; color: var(--ink); line-height: 1; letter-spacing: -2px; }
  #date-str { font-size: 13px; color: var(--ink-muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
  .weather-block { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .weather-temp { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--ink); }
  .weather-desc { font-size: 12px; color: var(--ink-muted); font-weight: 600; }

  /* MAIN GRID */
  .main { display: grid; grid-template-columns: 1fr 340px; gap: 12px; min-height: 0; }
  .left-col { display: grid; grid-template-rows: auto 1fr; gap: 12px; min-height: 0; }
  .right-col { display: grid; grid-template-rows: 1fr 1fr; gap: 12px; min-height: 0; }

  .card { background: var(--card); border-radius: var(--radius); border: 1px solid rgba(196,98,45,0.12); overflow: hidden; display: flex; flex-direction: column; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px 10px; border-bottom: 1px solid rgba(196,98,45,0.1); flex-shrink: 0; }
  .card-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .card-title .icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .card-body { flex: 1; overflow-y: auto; padding: 12px 18px 14px; min-height: 0; }
  .card-body::-webkit-scrollbar { width: 4px; }
  .card-body::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 4px; }

  /* WEEK STRIP */
  .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-cell { display: flex; flex-direction: column; align-items: center; padding: 8px 4px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s; border: 1.5px solid transparent; }
  .day-cell:hover { background: var(--terra-light); }
  .day-cell.today { background: var(--terra); border-color: var(--terra-dark); }
  .day-cell.today .day-name, .day-cell.today .day-num { color: white !important; }
  .day-cell.selected:not(.today) { border-color: var(--terra); background: var(--terra-light); }
  .day-name { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink-muted); }
  .day-num { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--ink); line-height: 1.1; margin: 2px 0; }
  .day-dots { display: flex; gap: 3px; min-height: 8px; flex-wrap: wrap; justify-content: center; }
  .day-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* WEEK NAV BUTTONS */
  .week-nav-btn { width: 28px; height: 28px; border-radius: 7px; border: 1.5px solid var(--ink-faint); background: transparent; cursor: pointer; font-size: 16px; color: var(--ink-muted); display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: 'Nunito', sans-serif; }
  .week-nav-btn:hover { border-color: var(--terra); color: var(--terra); background: var(--terra-light); }

  /* EVENTS */
  .event-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(44,24,16,0.06); }
  .event-item:last-child { border-bottom: none; }
  .event-time { font-size: 12px; font-weight: 700; color: var(--ink-muted); min-width: 42px; padding-top: 1px; letter-spacing: 0.3px; }
  .event-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; min-height: 36px; }
  .event-info { flex: 1; }
  .event-name { font-weight: 600; font-size: 14px; color: var(--ink); line-height: 1.3; }
  .event-meta { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
  .event-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .empty-state { text-align: center; padding: 24px 0; color: var(--ink-faint); font-family: 'Fraunces', serif; font-style: italic; font-size: 15px; }

  /* CHORES */
  .chore-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(44,24,16,0.06); transition: opacity 0.2s; }
  .chore-item:last-child { border-bottom: none; }
  .chore-item.done { opacity: 0.45; }
  .chore-item.done .chore-name { text-decoration: line-through; }
  .chore-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--ink-faint); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; background: white; }
  .chore-check.checked { background: var(--sage); border-color: var(--sage); }
  .chore-check.checked::after { content: ''; width: 6px; height: 10px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg) translate(-1px,-1px); display: block; }
  .chore-info { flex: 1; min-width: 0; }
  .chore-name { font-weight: 600; font-size: 13px; color: var(--ink); }
  .member-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .progress-bar-wrap { height: 4px; background: rgba(44,24,16,0.08); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--sage); border-radius: 2px; transition: width 0.4s ease; }
  .chores-progress-label { font-size: 12px; color: var(--sage); font-weight: 700; }

  /* UPCOMING EVENTS */
  .school-item { display: flex; align-items: flex-start; gap: 12px; padding: 9px 0; border-bottom: 1px solid rgba(44,24,16,0.06); }
  .school-item:last-child { border-bottom: none; }
  .school-date-box { display: flex; flex-direction: column; align-items: center; width: 38px; flex-shrink: 0; background: var(--blue-light); border-radius: 8px; padding: 4px; }
  .school-month { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; color: var(--blue); }
  .school-day { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--blue); line-height: 1; }
  .school-info { flex: 1; }
  .school-name { font-weight: 700; font-size: 13px; color: var(--ink); line-height: 1.3; }
  .school-detail { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
  .days-away { font-size: 11px; font-weight: 700; color: var(--terra); flex-shrink: 0; align-self: center; }
  .section-header-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }

  /* MEAL PLAN */
  .meal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; height: 100%; }
  .meal-day-col { display: flex; flex-direction: column; gap: 4px; min-width: 0; min-height: 0; }
  .meal-day-header { text-align: center; padding: 3px 4px; border-radius: 6px; background: var(--cream); border: 1px solid rgba(196,98,45,0.1); flex-shrink: 0; }
  .meal-day-header.is-today { background: var(--terra); border-color: var(--terra-dark); }
  .meal-day-header.is-today .meal-day-name, .meal-day-header.is-today .meal-day-num { color: white; }
  .meal-day-name { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink-muted); }
  .meal-day-num { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1; }
  .meal-section { flex: 1; background: var(--cream); border-radius: 6px; border: 1px solid rgba(196,98,45,0.08); padding: 4px 6px; display: flex; flex-direction: column; gap: 3px; overflow: hidden; min-height: 0; }
  .meal-section-label { font-size: 9px; font-weight: 800; letter-spacing: 0.4px; text-transform: uppercase; padding-bottom: 2px; border-bottom: 1px solid rgba(44,24,16,0.07); flex-shrink: 0; }
  .meal-section-label.parents-label { color: var(--blue); }
  .meal-section-label.kids-label { color: var(--purple); }
  .meal-chips { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; flex: 1; min-height: 0; }
  .meal-chips::-webkit-scrollbar { display: none; }
  .meal-chip { display: flex; align-items: center; justify-content: space-between; background: white; border-radius: 4px; padding: 2px 4px; font-size: 10px; font-weight: 600; color: var(--ink); border: 1px solid rgba(44,24,16,0.07); line-height: 1.3; gap: 3px; }
  .meal-chip span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .meal-chip-remove { cursor: pointer; color: var(--ink-faint); font-size: 9px; flex-shrink: 0; line-height: 1; }
  .meal-chip-remove:hover { color: var(--terra); }
  .meal-add-btn { font-size: 9px; font-weight: 700; color: var(--ink-faint); background: transparent; border: 1px dashed var(--ink-faint); border-radius: 4px; padding: 2px 4px; cursor: pointer; text-align: center; transition: all 0.15s; flex-shrink: 0; font-family: 'Nunito', sans-serif; }
  .meal-add-btn:hover { border-color: var(--terra); color: var(--terra); }
  .meal-input-row { display: flex; gap: 3px; flex-shrink: 0; }
  .meal-input { flex: 1; font-size: 10px; padding: 2px 4px; border: 1.5px solid var(--terra); border-radius: 4px; font-family: 'Nunito', sans-serif; background: white; color: var(--ink); min-width: 0; outline: none; }
  .meal-confirm-btn { background: var(--terra); border: none; border-radius: 4px; color: white; font-size: 10px; font-weight: 700; padding: 2px 5px; cursor: pointer; font-family: 'Nunito', sans-serif; }

  /* BUTTONS */
  .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--terra); color: white; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-cancel { background: var(--terra-light); color: var(--terra-dark); }
  .btn-cancel:hover { opacity: 0.8; }
  .add-btn { background: transparent; border: 1.5px dashed var(--ink-faint); border-radius: var(--radius-sm); color: var(--ink-muted); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; padding: 7px 12px; cursor: pointer; width: 100%; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 8px; }
  .add-btn:hover { border-color: var(--terra); color: var(--terra); background: var(--terra-light); }

  /* MODALS */
  .modal-overlay { position: fixed; inset: 0; background: rgba(44,24,16,0.5); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 20px; padding: 24px; width: 420px; max-width: 90vw; }
  .modal h3 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; margin-bottom: 16px; color: var(--ink); }
  .modal input, .modal select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--ink-faint); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--ink); background: white; margin-bottom: 10px; outline: none; }
  .modal input:focus, .modal select:focus { border-color: var(--terra); }
  .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="family-name">The Fordyces <span>command center</span></div>
  </div>
  <div class="clock-block">
    <div id="clock">—</div>
    <div id="date-str">Loading…</div>
  </div>
  <div class="weather-block">
    <div class="weather-temp">☀️ 19°C</div>
    <div class="weather-desc">Partly sunny · Berlin</div>
    <button onclick="location.reload()" style="margin-top:6px;background:var(--terra-light);border:none;color:var(--terra-dark);font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;letter-spacing:0.3px;">↺ Refresh</button>
    <button onclick="exportIcal()" style="margin-top:4px;background:var(--blue-light);border:none;color:var(--blue);font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;letter-spacing:0.3px;">📅 Export to iCal</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="left-col">

    <!-- WEEK CALENDAR -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <div class="icon" style="background:var(--terra-light);">📅</div>
          <span id="week-label">This Week</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="week-nav-btn" onclick="prevWeek()" title="Previous week">‹</button>
          <button class="week-nav-btn" onclick="nextWeek()" title="Next week">›</button>
          <button class="btn btn-primary" style="flex:none;padding:6px 14px;font-size:12px;border-radius:8px;" onclick="openAddEvent()">+ Add Event</button>
        </div>
      </div>
      <div class="card-body" style="padding-top:14px;">
        <div class="week-strip" id="week-strip"></div>
      </div>
    </div>

    <!-- SELECTED DAY EVENTS -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <div class="icon" style="background:var(--amber-light);">🗓</div>
          <span id="day-events-label">Today's Events</span>
        </div>
        <span id="event-count-badge" class="section-header-badge" style="background:var(--amber-light);color:var(--amber);">0 events</span>
      </div>
      <div class="card-body" id="events-list"></div>
    </div>

  </div>

  <div class="right-col">

    <!-- CHORES -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <div class="icon" style="background:var(--sage-light);">✅</div>
          <span>Daily Chores</span>
        </div>
        <span class="chores-progress-label" id="chores-progress-label">0 / 0 done</span>
      </div>
      <div class="card-body">
        <div class="progress-bar-wrap" style="margin-bottom:12px;">
          <div class="progress-bar-fill" id="chore-progress-fill" style="width:0%"></div>
        </div>
        <div id="chores-list"></div>
        <button class="add-btn" onclick="openAddChore()">+ Add chore</button>
      </div>
    </div>

    <!-- UPCOMING EVENTS -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <div class="icon" style="background:var(--blue-light);">🎒</div>
          <span>Upcoming Events</span>
        </div>
        <button class="btn btn-primary" style="flex:none;padding:6px 14px;font-size:12px;border-radius:8px;" onclick="openAddSchool()">+ Add</button>
      </div>
      <div class="card-body" id="school-list"></div>
    </div>

  </div>
</div>

<!-- MEAL PLAN -->
<div class="card">
  <div class="card-header">
    <div class="card-title">
      <div class="icon" style="background:var(--amber-light);">🍽</div>
      <span>Meal Plan</span>
    </div>
    <span id="meal-week-label" class="section-header-badge" style="background:var(--terra-light);color:var(--terra-dark);">This Week</span>
  </div>
  <div class="card-body" style="padding:10px 18px;overflow:hidden;">
    <div class="meal-grid" id="meal-grid"></div>
  </div>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <h3>Add Calendar Event</h3>
    <input type="text" id="ev-name" placeholder="Event name">
    <input type="date" id="ev-date">
    <input type="time" id="ev-time" placeholder="Time (optional)">
    <select id="ev-member">
      <option value="">Whole Family</option>
      <option value="andy">Andy</option>
      <option value="helle">Helle</option>
      <option value="eilidh">Eilidh</option>
      <option value="mads">Mads</option>
    </select>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEvent()">Add Event</button>
    </div>
  </div>
</div>

<!-- ADD CHORE MODAL -->
<div class="modal-overlay" id="modal-chore">
  <div class="modal">
    <h3>Add Daily Chore</h3>
    <input type="text" id="ch-name" placeholder="Chore name">
    <select id="ch-member">
      <option value="andy">Andy</option>
      <option value="helle">Helle</option>
      <option value="eilidh">Eilidh</option>
      <option value="mads">Mads</option>
    </select>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="saveChore()">Add Chore</button>
    </div>
  </div>
</div>

<!-- ADD UPCOMING EVENT MODAL -->
<div class="modal-overlay" id="modal-school">
  <div class="modal">
    <h3>Add Upcoming Event</h3>
    <input type="text" id="sc-name" placeholder="Event name">
    <input type="date" id="sc-date">
    <input type="text" id="sc-detail" placeholder="Details (teacher, location…)">
    <select id="sc-kid">
      <option value="">Whole family</option>
      <option value="andy">Andy</option>
      <option value="helle">Helle</option>
      <option value="eilidh">Eilidh</option>
      <option value="mads">Mads</option>
    </select>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSchool()">Add Event</button>
    </div>
  </div>
</div>

<script>
const MEMBERS = {
  helle:    { label: 'Helle',   bg: 'var(--rose-light)',   color: 'var(--rose)' },
  andy:     { label: 'Andy',    bg: 'var(--blue-light)',   color: 'var(--blue)' },
  eilidh:   { label: 'Eilidh',  bg: 'var(--purple-light)', color: 'var(--purple)' },
  mads:     { label: 'Mads',    bg: 'var(--green-light)',  color: 'var(--green)' },
  '':       { label: 'Family',  bg: 'var(--terra-light)',  color: 'var(--terra)' },
  parents:  { label: 'Parents', bg: 'var(--blue-light)',   color: 'var(--blue)' },
  children: { label: 'Kids',    bg: 'var(--purple-light)', color: 'var(--purple)' },
};

const EVENT_COLORS = {
  helle: '#B84465', andy: '#3D6B99', eilidh: '#6B4E9B',
  mads: '#3D7A4E', '': '#C4622D', parents: '#3D6B99', children: '#6B4E9B',
};

const today = new Date();
let selectedDate = new Date(today);
let weekOffset = 0;
let activeInput = null;

let events = [
  { id: 1, name: 'School Drop-off', date: fmt(today), time: '08:15', member: 'andy' },
  { id: 2, name: 'Yoga Class', date: fmt(today), time: '10:00', member: 'helle' },
  { id: 3, name: "Mads' Football", date: fmt(addDays(today,1)), time: '16:00', member: 'mads' },
  { id: 4, name: 'Family Dinner', date: fmt(addDays(today,2)), time: '19:00', member: '' },
  { id: 5, name: "Eilidh's Playdate", date: fmt(addDays(today,3)), time: '14:00', member: 'eilidh' },
  { id: 6, name: 'Grocery Run', date: fmt(addDays(today,4)), time: '', member: 'helle' },
];

let chores = [];

let schoolEvents = [];

// meals[dateStr] = { parents: ['meal1', ...], children: ['meal1', ...] }
let meals = {};

let nextId = 100;

function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDisplayDate(d) { return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' }); }

/* WEEK HELPERS */
function getWeekStart(offset) {
  const d = new Date(today);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + (offset * 7));
  return d;
}

function updateWeekLabels() {
  const start = getWeekStart(weekOffset);
  const end = addDays(start, 6);
  let label;
  if (weekOffset === 0) label = 'This Week';
  else if (weekOffset === 1) label = 'Next Week';
  else if (weekOffset === -1) label = 'Last Week';
  else label = start.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' – ' + end.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  document.getElementById('week-label').textContent = label;
  document.getElementById('meal-week-label').textContent = label;
}

function prevWeek() {
  weekOffset--;
  selectedDate = getWeekStart(weekOffset);
  activeInput = null;
  updateWeekLabels(); renderWeek(); renderEvents(); renderMealPlan();
}

function nextWeek() {
  weekOffset++;
  selectedDate = getWeekStart(weekOffset);
  activeInput = null;
  updateWeekLabels(); renderWeek(); renderEvents(); renderMealPlan();
}

/* CLOCK */
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  document.getElementById('date-str').textContent = n.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

/* WEEK STRIP */
function renderWeek() {
  const monday = getWeekStart(weekOffset);
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

  for (let i = 0; i < 7; i++) {
    const d = addDays(monday, i);
    const ds = fmt(d);
    const isToday = ds === fmt(today);
    const isSelected = ds === fmt(selectedDate);
    const dayEvts = events.filter(e => e.date === ds);
    const dm = meals[ds];
    const hasMeals = dm && ((dm.parents||[]).length || (dm.children||[]).length);
    const hasUpcoming = schoolEvents.some(e => e.date === ds);

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isToday ? ' today' : '') + (isSelected && !isToday ? ' selected' : '');

    let dots = dayEvts.map(e => {
      const c = EVENT_COLORS[e.member] || '#C4622D';
      return `<div class="day-dot" style="background:${isToday ? 'rgba(255,255,255,0.7)' : c}"></div>`;
    }).join('');
    if (hasMeals) dots += `<div class="day-dot" style="background:${isToday ? 'rgba(255,255,255,0.7)' : 'var(--amber)'}"></div>`;
    if (hasUpcoming) dots += `<div class="day-dot" style="background:${isToday ? 'rgba(255,255,255,0.7)' : 'var(--blue)'}"></div>`;

    cell.innerHTML = `
      <div class="day-name">${dayNames[d.getDay()]}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-dots">${dots}</div>
    `;
    cell.addEventListener('click', () => { selectedDate = new Date(d); renderWeek(); renderEvents(); });
    strip.appendChild(cell);
  }
}

/* EVENTS LIST */
function renderEvents() {
  const ds = fmt(selectedDate);
  const isToday = ds === fmt(today);
  document.getElementById('day-events-label').textContent = isToday ? "Today's Events" : fmtDisplayDate(selectedDate);

  const dayEvts = events.filter(e => e.date === ds).sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));

  const mealEvts = [];
  const dm = meals[ds];
  if (dm) {
    (dm.parents||[]).forEach(m => mealEvts.push({ id: null, name: '🍽 ' + m, time: '', member: 'parents' }));
    (dm.children||[]).forEach(m => mealEvts.push({ id: null, name: '🍽 ' + m, time: '', member: 'children' }));
  }

  const upcomingEvts = schoolEvents
    .filter(e => e.date === ds)
    .map(e => ({ id: null, name: '📌 ' + e.name, time: '', member: e.kid || '' }));

  const allEvts = [...dayEvts, ...mealEvts, ...upcomingEvts];
  const badge = document.getElementById('event-count-badge');
  badge.textContent = allEvts.length + (allEvts.length === 1 ? ' event' : ' events');

  const list = document.getElementById('events-list');
  if (!allEvts.length) { list.innerHTML = '<div class="empty-state">Nothing scheduled — enjoy the calm ✦</div>'; return; }

  list.innerHTML = allEvts.map(e => {
    const m = MEMBERS[e.member] || MEMBERS[''];
    const color = EVENT_COLORS[e.member] || '#C4622D';
    return `
      <div class="event-item">
        <div class="event-time">${e.time || '—'}</div>
        <div class="event-bar" style="background:${color}"></div>
        <div class="event-info">
          <div class="event-name">${e.name}</div>
          <div class="event-meta"><span class="event-tag" style="background:${m.bg};color:${m.color}">${m.label}</span></div>
        </div>
        ${e.id !== null ? `<div style="cursor:pointer;font-size:16px;color:var(--ink-faint);padding:2px 6px;" onclick="deleteEvent(${e.id})">✕</div>` : ''}
      </div>
    `;
  }).join('');
}

function deleteEvent(id) { events = events.filter(e => e.id !== id); saveData(); renderWeek(); renderEvents(); }

/* CHORES */
function renderChores() {
  const done = chores.filter(c => c.done).length;
  const total = chores.length;
  document.getElementById('chores-progress-label').textContent = done + ' / ' + total + ' done';
  document.getElementById('chore-progress-fill').style.width = total ? Math.round(done/total*100)+'%' : '0%';
  document.getElementById('chores-list').innerHTML = chores.map(c => {
    const m = MEMBERS[c.member] || MEMBERS[''];
    return `
      <div class="chore-item ${c.done ? 'done' : ''}">
        <div class="chore-check ${c.done ? 'checked' : ''}" onclick="toggleChore(${c.id})"></div>
        <div class="chore-info"><div class="chore-name">${c.name}</div></div>
        <span class="member-badge" style="background:${m.bg};color:${m.color}">${m.label}</span>
        <div style="cursor:pointer;font-size:13px;color:var(--ink-faint);padding:2px 4px;" onclick="deleteChore(${c.id})">✕</div>
      </div>
    `;
  }).join('');
}

function toggleChore(id) { const c = chores.find(c => c.id === id); if (c) c.done = !c.done; saveData(); renderChores(); }
function deleteChore(id) { chores = chores.filter(c => c.id !== id); saveData(); renderChores(); }

/* UPCOMING EVENTS */
function renderSchool() {
  const todayMs = new Date(fmt(today) + 'T00:00:00').getTime();
  const sorted = [...schoolEvents].filter(e => parseDate(e.date).getTime() >= todayMs).sort((a,b) => a.date.localeCompare(b.date));
  const list = document.getElementById('school-list');
  if (!sorted.length) { list.innerHTML = '<div class="empty-state">No upcoming events</div>'; return; }
  list.innerHTML = sorted.map(e => {
    const d = parseDate(e.date);
    const daysAway = Math.round((d.getTime() - todayMs) / 86400000);
    const monthStr = d.toLocaleDateString('en-GB', { month: 'short' }).toUpperCase();
    const kid = e.kid ? MEMBERS[e.kid] : null;
    const daysLabel = daysAway === 0 ? 'Today!' : daysAway === 1 ? 'Tomorrow' : `in ${daysAway}d`;
    return `
      <div class="school-item">
        <div class="school-date-box">
          <div class="school-month">${monthStr}</div>
          <div class="school-day">${d.getDate()}</div>
        </div>
        <div class="school-info">
          <div class="school-name">${e.name}</div>
          <div class="school-detail">${e.detail}</div>
          ${kid ? `<span class="member-badge" style="background:${kid.bg};color:${kid.color};font-size:10px;padding:2px 7px;margin-top:3px;display:inline-flex">${kid.label}</span>` : ''}
        </div>
        <div class="days-away">${daysLabel}</div>
      </div>
    `;
  }).join('');
}

/* MEAL PLAN */
function renderMealPlan() {
  const monday = getWeekStart(weekOffset);
  const grid = document.getElementById('meal-grid');
  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  grid.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = addDays(monday, i);
    const ds = fmt(d);
    const isToday = ds === fmt(today);
    const dm = meals[ds] || { parents: [], children: [] };
    const parentActive = activeInput && activeInput.date === ds && activeInput.group === 'parents';
    const kidsActive   = activeInput && activeInput.date === ds && activeInput.group === 'children';

    const col = document.createElement('div');
    col.className = 'meal-day-col';
    col.innerHTML = `
      <div class="meal-day-header${isToday ? ' is-today' : ''}">
        <div class="meal-day-name">${dayNames[d.getDay()]}</div>
        <div class="meal-day-num">${d.getDate()}</div>
      </div>
      <div class="meal-section">
        <div class="meal-section-label parents-label">Parents</div>
        <div class="meal-chips">
          ${(dm.parents||[]).map((m,idx) => `<div class="meal-chip"><span>${m}</span><span class="meal-chip-remove" onclick="removeMeal('${ds}','parents',${idx})">✕</span></div>`).join('')}
        </div>
        ${parentActive
          ? `<div class="meal-input-row"><input class="meal-input" id="meal-input-field" type="text" placeholder="Meal…" onkeydown="handleMealKey(event,'${ds}','parents')"><button class="meal-confirm-btn" onclick="confirmMeal('${ds}','parents')">✓</button></div>`
          : `<button class="meal-add-btn" onclick="showMealInput('${ds}','parents')">+ add</button>`}
      </div>
      <div class="meal-section">
        <div class="meal-section-label kids-label">Kids</div>
        <div class="meal-chips">
          ${(dm.children||[]).map((m,idx) => `<div class="meal-chip"><span>${m}</span><span class="meal-chip-remove" onclick="removeMeal('${ds}','children',${idx})">✕</span></div>`).join('')}
        </div>
        ${kidsActive
          ? `<div class="meal-input-row"><input class="meal-input" id="meal-input-field" type="text" placeholder="Meal…" onkeydown="handleMealKey(event,'${ds}','children')"><button class="meal-confirm-btn" onclick="confirmMeal('${ds}','children')">✓</button></div>`
          : `<button class="meal-add-btn" onclick="showMealInput('${ds}','children')">+ add</button>`}
      </div>
    `;
    grid.appendChild(col);
  }

  if (activeInput) {
    const inp = document.getElementById('meal-input-field');
    if (inp) inp.focus();
  }
}

function showMealInput(date, group) { activeInput = { date, group }; renderMealPlan(); }

function confirmMeal(date, group) {
  const inp = document.getElementById('meal-input-field');
  const val = inp ? inp.value.trim() : '';
  if (val) {
    if (!meals[date]) meals[date] = { parents: [], children: [] };
    if (!meals[date][group]) meals[date][group] = [];
    meals[date][group].push(val);
  }
  activeInput = null;
  renderMealPlan(); renderWeek(); saveData();
  if (fmt(selectedDate) === date) renderEvents();
}

function handleMealKey(e, date, group) {
  if (e.key === 'Enter') confirmMeal(date, group);
  if (e.key === 'Escape') { activeInput = null; renderMealPlan(); }
}

function removeMeal(date, group, idx) {
  if (!meals[date]||!meals[date][group]) return;
  meals[date][group].splice(idx, 1);
  renderMealPlan(); renderWeek(); saveData();
  if (fmt(selectedDate) === date) renderEvents();
}

/* MODALS */
function openAddEvent() { document.getElementById('ev-date').value = fmt(selectedDate); document.getElementById('ev-name').value = ''; document.getElementById('ev-time').value = ''; document.getElementById('modal-event').classList.add('open'); }
function openAddChore() { document.getElementById('ch-name').value = ''; document.getElementById('modal-chore').classList.add('open'); }
function openAddSchool() { document.getElementById('sc-name').value = ''; document.getElementById('sc-date').value = ''; document.getElementById('sc-detail').value = ''; document.getElementById('modal-school').classList.add('open'); }
function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); }

function saveEvent() {
  const name = document.getElementById('ev-name').value.trim();
  const date = document.getElementById('ev-date').value;
  if (!name||!date) return;
  events.push({ id: nextId++, name, date, time: document.getElementById('ev-time').value, member: document.getElementById('ev-member').value });
  closeModals(); saveData(); renderWeek(); renderEvents();
}
function saveChore() {
  const name = document.getElementById('ch-name').value.trim();
  if (!name) return;
  chores.push({ id: nextId++, name, member: document.getElementById('ch-member').value, done: false });
  closeModals(); saveData(); renderChores();
}
function saveSchool() {
  const name = document.getElementById('sc-name').value.trim();
  const date = document.getElementById('sc-date').value;
  if (!name||!date) return;
  schoolEvents.push({ id: nextId++, name, date, detail: document.getElementById('sc-detail').value, kid: document.getElementById('sc-kid').value });
  closeModals(); saveData(); renderSchool();
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModals(); });
});

/* EXPORT TO ICAL */
function exportIcal() {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Fordyce Command Center//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:Fordyce Family',
  ];

  function icalDate(dateStr, timeStr) {
    const d = dateStr.replace(/-/g, '');
    if (timeStr) {
      const t = timeStr.replace(':', '') + '00';
      // Calculate end time +1hr
      const h = parseInt(timeStr.split(':')[0]);
      const m = timeStr.split(':')[1];
      const endH = String((h + 1) % 24).padStart(2, '0');
      return { start: `DTSTART:${d}T${t}`, end: `DTEND:${d}T${endH}${m}00` };
    }
    // All-day: DTEND is next day
    const next = fmt(addDays(parseDate(dateStr), 1)).replace(/-/g, '');
    return { start: `DTSTART;VALUE=DATE:${d}`, end: `DTEND;VALUE=DATE:${next}` };
  }

  function sanitise(str) {
    return (str || '').replace(/\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;');
  }

  // Calendar events
  events.forEach(e => {
    const member = MEMBERS[e.member] || MEMBERS[''];
    const { start, end } = icalDate(e.date, e.time);
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:ev-${e.id}@fordyce`);
    lines.push(start); lines.push(end);
    lines.push(`SUMMARY:${sanitise(e.name)}`);
    lines.push(`DESCRIPTION:${sanitise(member.label)}`);
    lines.push('END:VEVENT');
  });

  // Upcoming events
  schoolEvents.forEach(e => {
    const kid = e.kid ? MEMBERS[e.kid] : MEMBERS[''];
    const { start, end } = icalDate(e.date, '');
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:upcoming-${e.id}@fordyce`);
    lines.push(start); lines.push(end);
    lines.push(`SUMMARY:📌 ${sanitise(e.name)}`);
    lines.push(`DESCRIPTION:${sanitise(e.detail + (kid ? ' · ' + kid.label : ''))}`);
    lines.push('END:VEVENT');
  });

  // Meals
  Object.entries(meals).forEach(([date, dm]) => {
    (dm.parents||[]).forEach((m, idx) => {
      const { start, end } = icalDate(date, '');
      lines.push('BEGIN:VEVENT');
      lines.push(`UID:meal-p-${date}-${idx}@fordyce`);
      lines.push(start); lines.push(end);
      lines.push(`SUMMARY:🍽 ${sanitise(m)} (Parents)`);
      lines.push('END:VEVENT');
    });
    (dm.children||[]).forEach((m, idx) => {
      const { start, end } = icalDate(date, '');
      lines.push('BEGIN:VEVENT');
      lines.push(`UID:meal-k-${date}-${idx}@fordyce`);
      lines.push(start); lines.push(end);
      lines.push(`SUMMARY:🍽 ${sanitise(m)} (Kids)`);
      lines.push('END:VEVENT');
    });
  });

  lines.push('END:VCALENDAR');

  const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fordyce-family.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* PERSISTENCE */
function saveData() {
  localStorage.setItem('fordyce_events', JSON.stringify(events));
  localStorage.setItem('fordyce_chores', JSON.stringify(chores));
  localStorage.setItem('fordyce_school', JSON.stringify(schoolEvents));
  localStorage.setItem('fordyce_meals', JSON.stringify(meals));
  localStorage.setItem('fordyce_nextId', String(nextId));
}

function loadData() {
  try {
    const e = localStorage.getItem('fordyce_events');
    const c = localStorage.getItem('fordyce_chores');
    const s = localStorage.getItem('fordyce_school');
    const m = localStorage.getItem('fordyce_meals');
    const n = localStorage.getItem('fordyce_nextId');
    if (e) events = JSON.parse(e);
    if (c) chores = JSON.parse(c);
    if (s) schoolEvents = JSON.parse(s);
    if (m) meals = JSON.parse(m);
    if (n) nextId = parseInt(n);
  } catch(err) { console.warn('Could not load saved data', err); }
}

/* INIT */
loadData();
renderWeek(); renderEvents(); renderChores(); renderSchool(); renderMealPlan();

const lastReset = localStorage.getItem('lastReset');
const todayKey = fmt(today);
if (lastReset !== todayKey) {
  chores.forEach(c => c.done = false);
  localStorage.setItem('lastReset', todayKey);
  renderChores();
}
</script>
